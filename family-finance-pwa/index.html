const CUR = "AED";
const fmt = (n) => {
  if (n === undefined || n === null || isNaN(n)) return `0.00 ${CUR}`;
  return `${Number(n).toLocaleString("en-AE", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ${CUR}`;
};
const fmtCompact = (n) => {
  if (n >= 10000) return `${(n / 1000).toFixed(1)}k`;
  if (n >= 1000) return `${(n / 1000).toFixed(n % 1000 === 0 ? 0 : 1)}k`;
  return Number(n).toFixed(n % 1 === 0 ? 0 : 2);
};

const todayKey = () => {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;

function Toast({ msg, type }) {
  const c = { success: "var(--good)", danger: "var(--danger)", warning: "var(--warn)", info: "var(--accent)" };
  return <div className="toast-pop" style={{ position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)", zIndex: 999, background: c[type] || c.info, color: type === "warning" ? "#333" : "#fff", padding: "12px 28px", borderRadius: 16, fontWeight: 700, fontSize: 14, fontFamily: "var(--font)", boxShadow: `0 8px 30px ${c[type] || c.info}55` }}>{msg}</div>;
}
function Card({ children, style, className = "", onClick, delay = 0 }) {
  return <div onClick={onClick} className={`glass-card card-hover anim-fade ${className}`} style={{ padding: 20, animationDelay: `${delay}ms`, cursor: onClick ? "pointer" : "default", ...style }}>{children}</div>;
}
function Pill({ label, active, color, onClick, small }) {
  return <button onClick={onClick} className="btn-press" style={{ padding: small ? "6px 13px" : "9px 18px", borderRadius: 14, fontFamily: "var(--font)", border: active ? `2px solid ${color}` : "1.5px solid var(--border2)", background: active ? color + "22" : "var(--glass)", color: active ? color : "var(--text2)", fontWeight: 700, fontSize: small ? 12 : 13, cursor: "pointer", transition: "all 0.25s cubic-bezier(.22,1,.36,1)", transform: active ? "scale(1.05)" : "scale(1)", boxShadow: active ? `0 4px 18px ${color}33` : "none" }}>{label}</button>;
}
function AmountInput({ value, onChange, color = "var(--accent)", placeholder = "0.00", large }) {
  const [raw, setRaw] = useState(value ? String(value) : "");
  const [focused, setFocused] = useState(false);
  // Sync raw display when value changes externally (pills, steppers) but NOT while user is typing
  useEffect(() => {
    if (!focused) {
      if (value === 0) setRaw("");
      else setRaw(String(value % 1 === 0 ? value : value.toFixed(2)));
    }
  }, [value, focused]);
  const handleChange = (e) => {
    const v = e.target.value;
    if (v === "" || v === "." || /^\d*\.?\d{0,2}$/.test(v)) {
      setRaw(v);
      const n = parseFloat(v);
      onChange(isNaN(n) ? 0 : Math.max(0, n));
    }
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, background: "rgba(0,0,0,0.3)", borderRadius: 18, padding: large ? "12px 20px" : "10px 16px", border: `2px solid ${color}33`, transition: "border-color 0.2s" }}
      onFocus={e => e.currentTarget.style.borderColor = color + "88"} onBlur={e => e.currentTarget.style.borderColor = color + "33"}>
      <span style={{ fontSize: large ? 16 : 14, color: "var(--text3)", fontWeight: 800, fontFamily: "var(--font2)" }}>{CUR}</span>
      <input type="text" inputMode="decimal" value={raw} onChange={handleChange}
        onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
        placeholder={placeholder}
        style={{ flex: 1, border: "none", background: "transparent", outline: "none", fontSize: large ? 32 : 24, fontWeight: 900, color: color, fontFamily: "var(--font2)", textAlign: "center", width: "100%" }} />
    </div>
  );
}
function Stepper({ value, onChange, step, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14 }}>
      <button onClick={() => onChange(Math.max(0, Math.round((value - step) * 100) / 100))} className="btn-press" style={{ width: 48, height: 48, borderRadius: 16, border: "1.5px solid var(--border2)", background: "var(--glass2)", color: "var(--text)", fontSize: 22, fontWeight: 800, cursor: "pointer" }}>−</button>
      <span style={{ fontSize: 13, color: "var(--text3)", fontWeight: 700, minWidth: 70, textAlign: "center", fontFamily: "var(--font)" }}>±{step}</span>
      <button onClick={() => onChange(Math.round((value + step) * 100) / 100)} className="btn-press" style={{ width: 48, height: 48, borderRadius: 16, border: "none", background: color || "var(--accent)", color: "#fff", fontSize: 22, fontWeight: 800, cursor: "pointer", boxShadow: `0 4px 18px ${color || "var(--accent)"}55` }}>+</button>
    </div>
  );
}
function PinPad({ onSubmit, label }) {
  const [pin, setPin] = useState("");
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 20 }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: "var(--text)" }}>{label}</div>
      <div style={{ display: "flex", gap: 14 }}>
        {[0,1,2,3].map(i => <div key={i} style={{ width: 18, height: 18, borderRadius: "50%", background: i < pin.length ? "var(--accent)" : "var(--border2)", transition: "all 0.2s cubic-bezier(.22,1,.36,1)", transform: i < pin.length ? "scale(1.3)" : "scale(1)", boxShadow: i < pin.length ? "0 0 12px rgba(108,92,231,0.5)" : "none" }} />)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>
        {[1,2,3,4,5,6,7,8,9,null,0,"⌫"].map((n, i) => <button key={i} disabled={n === null} className="btn-press" onClick={() => { if (n === "⌫") { setPin(p => p.slice(0, -1)); return; } const next = pin + n; setPin(next); if (next.length === 4) setTimeout(() => { onSubmit(next); setPin(""); }, 200); }}
          style={{ width: 68, height: 56, borderRadius: 16, border: "1px solid var(--border2)", background: n === null ? "transparent" : "var(--glass2)", fontSize: 22, fontWeight: 700, cursor: n === null ? "default" : "pointer", color: "var(--text)", fontFamily: "var(--font2)", opacity: n === null ? 0 : 1 }}>{n !== null ? n : ""}</button>)}
      </div>
    </div>
  );
}
function DonutChart({ data, size = 160 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return <div style={{ width: size, height: size, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text3)", fontSize: 13 }}>No data yet</div>;
  const cx = size / 2, cy = size / 2, r = size * 0.37, sw = size * 0.12;
  let cum = -90;
  return (
    <svg width={size} height={size}>
      {data.filter(d => d.value > 0).map(d => { const a = (d.value / total) * 360; const s = cum; cum += a; const rad = x => (x * Math.PI) / 180;
        return <path key={d.id} fill="none" stroke={d.color} strokeWidth={sw} strokeLinecap="round" d={`M ${cx + r * Math.cos(rad(s))} ${cy + r * Math.sin(rad(s))} A ${r} ${r} 0 ${a > 180 ? 1 : 0} 1 ${cx + r * Math.cos(rad(cum - 0.5))} ${cy + r * Math.sin(rad(cum - 0.5))}`} style={{ filter: `drop-shadow(0 2px 6px ${d.color}44)` }} />;
      })}
      <text x={cx} y={cy - 4} textAnchor="middle" style={{ fontSize: 11, fill: "var(--text3)", fontFamily: "var(--font)" }}>Total</text>
      <text x={cx} y={cy + 14} textAnchor="middle" style={{ fontSize: 16, fontWeight: 900, fill: "var(--text)", fontFamily: "var(--font2)" }}>{fmtCompact(total)}</text>
    </svg>
  );
}
function MiniBar({ pct, color, height = 6 }) {
  return <div style={{ height, borderRadius: height / 2, background: "rgba(255,255,255,0.06)", overflow: "hidden", width: "100%" }}><div style={{ height: "100%", borderRadius: height / 2, width: `${Math.min(Math.max(pct, 0), 100)}%`, background: color, transition: "width 0.6s cubic-bezier(.22,1,.36,1)", boxShadow: `0 0 8px ${color}44` }} /></div>;
}
function Section({ icon, title, children }) {
  return <div><div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}><span style={{ fontSize: 18 }}>{icon}</span><span style={{ fontWeight: 800, fontSize: 15, fontFamily: "var(--font)" }}>{title}</span></div>{children}</div>;
}

function Avatar({ member, size = 42, fontSize = 22, editable, onPhotoChange }) {
  const s = size;
  const hasPhoto = member.photo;
  const rad = size > 44 ? 18 : size > 36 ? 14 : 12;
  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      // Resize to 256x256 for crisp quality at all display sizes
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const TARGET = 400;
        canvas.width = TARGET;
        canvas.height = TARGET;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        // Center-crop to square
        const min = Math.min(img.width, img.height);
        const sx = (img.width - min) / 2;
        const sy = (img.height - min) / 2;
        ctx.drawImage(img, sx, sy, min, min, 0, 0, TARGET, TARGET);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
        onPhotoChange?.(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };
  return (
    <div style={{ position: "relative", width: s, height: s, flexShrink: 0 }}>
      {hasPhoto ? (
        <img src={member.photo} alt={member.name} style={{
          width: s, height: s, borderRadius: rad, objectFit: "cover",
          border: `2.5px solid ${member.color}66`,
          imageRendering: "auto",
          boxShadow: `0 2px 12px ${member.color}33`,
        }} />
      ) : (
        <div style={{
          width: s, height: s, borderRadius: rad,
          background: `linear-gradient(135deg, ${member.color}33, ${member.color}11)`,
          border: `2px solid ${member.color}44`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: fontSize,
        }}>{member.avatar}</div>
      )}
      {editable && (
        <label className="btn-press" style={{
          position: "absolute", bottom: -4, right: -4,
          width: size > 44 ? 28 : 24, height: size > 44 ? 28 : 24, borderRadius: "50%",
          background: "var(--accent)", border: "2.5px solid var(--bg)",
          display: "flex", alignItems: "center", justifyContent: "center",
          cursor: "pointer", fontSize: size > 44 ? 14 : 12, color: "#fff",
          boxShadow: "0 2px 10px rgba(0,0,0,0.5)",
        }}>
          📷
          <input type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
        </label>
      )}
    </div>
  );
}

function App() {
  const [st, setSt] = useState(null);
  const [loading, setLoading] = useState(true);
  const [screen, setScreen] = useState("login");
  const [me, setMe] = useState(null);
  const [selMonth, setSelMonth] = useState(CUR_MONTH);
  const [selYear, setSelYear] = useState(CUR_YEAR);
  const [aTab, setATab] = useState("overview");
  const [mTab, setMTab] = useState("add");
  const [addCat, setAddCat] = useState(null);
  const [addAmt, setAddAmt] = useState(0);
  const [addStep, setAddStep] = useState(50);
  const [addNote, setAddNote] = useState("");
  const [showSub, setShowSub] = useState(false);
  const [subCat, setSubCat] = useState("subscriptions");
  const [subAmt, setSubAmt] = useState(0);
  const [subPer, setSubPer] = useState("Monthly");
  const [subName, setSubName] = useState("");
  const [setupStep, setSetupStep] = useState(0);
  const [setupInc, setSetupInc] = useState(15000);
  const [setupMems, setSetupMems] = useState([{ name: "", avatar: "👤", color: "#FF6B6B" }]);
  const [toast, setToast] = useState(null);
  const [logged, setLogged] = useState(() => { try { return JSON.parse(localStorage.getItem("ff-stay5") || "null"); } catch { return null; } });

  const showToast = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 2800); };
  const persist = useCallback((fn) => setSt(p => { const n = fn(p); return { ...n }; }), []);

  useEffect(() => { (async () => { const d = await load(); if (d?.setupDone) { setSt(d); if (logged?.type === "admin") setScreen("admin"); else if (logged?.type === "member") { const m = d.members.find(x => x.id === logged.id); if (m) { setMe(m); setScreen("member"); } } } else { setSt(blank()); setScreen("setup"); } setLoading(false); })(); }, []);
  useEffect(() => { if (st?.setupDone) save(st); }, [st]);

  const mk = monthKey(selMonth, selYear);
  const mExps = useMemo(() => st?.expenses?.filter(e => e.date.startsWith(mk)) || [], [st?.expenses, mk]);
  const memExps = useCallback((mid) => mExps.filter(e => e.memberId === mid), [mExps]);
  const catTotals = useMemo(() => { const m = {}; CATS.forEach(c => m[c.id] = 0); mExps.forEach(e => m[e.category] = (m[e.category] || 0) + e.amount); return m; }, [mExps]);
  const monthTotal = useMemo(() => mExps.reduce((s, e) => s + e.amount, 0), [mExps]);
  const monthSubs = useMemo(() => (st?.subscriptions || []).reduce((s, sub) => s + (sub.period === "Monthly" ? sub.amount : sub.period === "Yearly" ? sub.amount / 12 : sub.amount * 4.33), 0), [st?.subscriptions]);

  const addExpense = () => { if (!addCat || addAmt <= 0) return; persist(p => ({ ...p, expenses: [...p.expenses, { id: Date.now().toString(), memberId: me.id, memberName: me.name, category: addCat, amount: addAmt, note: addNote, date: todayKey(), timestamp: Date.now() }] })); showToast(`${fmt(addAmt)} added`); setAddCat(null); setAddAmt(0); setAddNote(""); };
  const addSub = () => { if (!subName.trim() || subAmt <= 0) return; persist(p => ({ ...p, subscriptions: [...p.subscriptions, { id: Date.now().toString(), memberId: me?.id || "admin", name: subName, category: subCat, amount: subAmt, period: subPer }] })); showToast(`"${subName}" added`); setShowSub(false); setSubName(""); setSubAmt(0); };
  const delSub = (id) => persist(p => ({ ...p, subscriptions: p.subscriptions.filter(s => s.id !== id) }));
  const delExp = (id) => persist(p => ({ ...p, expenses: p.expenses.filter(e => e.id !== id) }));
  const logout = () => { setScreen("login"); setMe(null); localStorage.removeItem("ff-stay5"); setLogged(null); };
  const updateMemberPhoto = (memberId, photoData) => {
    persist(p => ({ ...p, members: p.members.map(m => m.id === memberId ? { ...m, photo: photoData } : m) }));
    if (me && me.id === memberId) setMe(prev => ({ ...prev, photo: photoData }));
    showToast("Photo updated!");
  };
  const removeMemberPhoto = (memberId) => {
    persist(p => ({ ...p, members: p.members.map(m => m.id === memberId ? { ...m, photo: null } : m) }));
    if (me && me.id === memberId) setMe(prev => ({ ...prev, photo: null }));
    showToast("Photo removed");
  };
  const prevMonth = () => { if (selMonth === 0) { setSelMonth(11); setSelYear(y => y - 1); } else setSelMonth(m => m - 1); };
  const nextMonth = () => { if (selMonth === 11) { setSelMonth(0); setSelYear(y => y + 1); } else setSelMonth(m => m + 1); };

  const getRecs = (memberId = null) => {
    const exps = memberId ? memExps(memberId) : mExps;
    const total = exps.reduce((s, e) => s + e.amount, 0);
    const inc = st?.monthlyIncome || 0;
    const subs = (st?.subscriptions || []).filter(s => !memberId || s.memberId === memberId);
    const subTot = subs.reduce((s, sub) => s + (sub.period === "Monthly" ? sub.amount : sub.period === "Yearly" ? sub.amount / 12 : sub.amount * 4.33), 0);
    const cats = {}; exps.forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);
    const remaining = inc - monthTotal - monthSubs;
    const recs = [];
    if (total === 0) { recs.push({ icon: "📝", text: "No expenses yet this month. Start tracking to unlock insights!", type: "info" }); return recs; }
    if (!memberId && remaining < 0) recs.push({ icon: "🚨", text: `Over budget by ${fmt(Math.abs(remaining))}! Review dining, entertainment, and subscriptions.`, type: "danger" });
    if (!memberId && remaining >= 0 && (monthTotal + monthSubs) > inc * 0.85) recs.push({ icon: "⚠️", text: `${(((monthTotal + monthSubs) / inc) * 100).toFixed(0)}% of income used — tighten spending for rest of the month.`, type: "warning" });
    const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
    if (sorted.length) { const t = sorted[0]; const c = CATS.find(x => x.id === t[0]); recs.push({ icon: c?.icon || "📊", text: `Biggest spend: ${c?.name} at ${fmt(t[1])} (${((t[1] / total) * 100).toFixed(0)}% of ${memberId ? "your" : "family"} total).`, type: "info" }); }
    if ((cats.dining || 0) > (cats.groceries || 0) && (cats.dining || 0) > 0) recs.push({ icon: "🍳", text: `Dining out (${fmt(cats.dining)}) exceeds groceries (${fmt(cats.groceries || 0)}). Cooking at home saves 40-60%.`, type: "warning" });
    if ((cats.entertainment || 0) > total * 0.12) recs.push({ icon: "🎮", text: `Entertainment is ${((cats.entertainment / total) * 100).toFixed(0)}% of spending. Explore free alternatives.`, type: "info" });
    if (subTot > (memberId ? total * 0.2 : inc * 0.12)) recs.push({ icon: "📱", text: `Subscriptions cost ~${fmt(Math.round(subTot * 100) / 100)}/mo. Most people overpay by 30% — audit yours.`, type: "warning" });
    if (!memberId && (cats.savings || 0) < inc * 0.1 && inc > 0) recs.push({ icon: "🐖", text: `Only ${(((cats.savings || 0) / inc) * 100).toFixed(0)}% to savings. Automate 10-20% on payday.`, type: "warning" });
    if (!memberId && (cats.savings || 0) >= inc * 0.2) recs.push({ icon: "🏆", text: `${(((cats.savings || 0) / inc) * 100).toFixed(0)}% savings — excellent! Consider index funds or property.`, type: "success" });
    if ((cats.rent || 0) > (memberId ? total * 0.45 : inc * 0.35)) recs.push({ icon: "🏠", text: `Housing costs are high at ${fmt(cats.rent)}. Consider negotiating or shared living.`, type: "warning" });
    if ((cats.transport || 0) > total * 0.15) recs.push({ icon: "🚌", text: `Transport is ${((cats.transport / total) * 100).toFixed(0)}% — try public transit or carpooling.`, type: "info" });
    if (!memberId && remaining > inc * 0.2 && remaining > 0) recs.push({ icon: "💰", text: `${fmt(remaining)} remaining — build a 3-6 month emergency fund.`, type: "success" });
    if ((cats.clothing || 0) > total * 0.1) recs.push({ icon: "👕", text: `Clothing at ${fmt(cats.clothing)} — try seasonal sales or capsule wardrobe.`, type: "info" });
    if (!memberId && st.members.length > 1) { const md = st.members.map(m => ({ ...m, t: memExps(m.id).reduce((s, e) => s + e.amount, 0) })).sort((a, b) => b.t - a.t); recs.push({ icon: md[0].avatar, text: `${md[0].name} spent the most (${fmt(md[0].t)}). Family avg: ${fmt(Math.round(monthTotal / st.members.length * 100) / 100)}.`, type: "info" }); }
    return recs;
  };

  const MonthNav = () => (
    <div className="anim-fade" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginBottom: 16 }}>
      <button onClick={prevMonth} className="btn-press" style={{ width: 36, height: 36, borderRadius: 12, border: "1px solid var(--border2)", background: "var(--glass2)", color: "var(--text)", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>‹</button>

      <div className="glow-orb" style={{ width: 250, height: 250, background: "#00D2FF", bottom: 100, left: -80 }} />
      <div className="glow-orb" style={{ width: 200, height: 200, background: "#FF6B6B", top: "40%", right: -100 }} />
      <div style={{ position: "relative", zIndex: 1 }}>{content}</div>
      {toast && <Toast msg={toast.msg} type={toast.type} />}

  if (loading) return shell(<div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}><div style={{ textAlign: "center" }}><div style={{ fontSize: 48, animation: "float 2s ease-in-out infinite" }}>💳</div><div style={{ color: "var(--text3)", marginTop: 12, animation: "pulse 1.5s infinite" }}>Loading...</div></div></div>);

  // ═══ SETUP ═══
  if (screen === "setup") return shell(
    <div style={{ maxWidth: 460, margin: "0 auto", padding: 20, paddingTop: 40 }}>
      <div className="anim-fade" style={{ textAlign: "center", marginBottom: 32 }}>
        <div style={{ fontSize: 52, marginBottom: 10, animation: "float 3s ease-in-out infinite" }}>💳</div>

        <p style={{ color: "var(--text3)", fontSize: 14, marginTop: 6 }}>Step {setupStep + 1} of 3</p>
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 14 }}>
          {[0,1,2].map(i => <div key={i} style={{ width: i <= setupStep ? 44 : 22, height: 5, borderRadius: 3, background: i <= setupStep ? "var(--accent)" : "var(--border2)", transition: "all 0.4s", boxShadow: i <= setupStep ? "0 0 10px rgba(108,92,231,0.4)" : "none" }} />)}

        </div>

                <input value={m.name} onChange={e => { const c = [...setupMems]; c[i].name = e.target.value; setSetupMems(c); }} placeholder="Name..." style={{ width: "100%", padding: "10px 14px", borderRadius: 12, border: "1px solid var(--border2)", background: "rgba(0,0,0,0.3)", color: "var(--text)", fontSize: 15, fontFamily: "var(--font)", outline: "none" }} />

        </Section>
        <button onClick={() => setSetupStep(1)} className="btn-press" style={{ marginTop: 18, padding: "10px 28px", borderRadius: 12, border: "1px solid var(--border2)", background: "var(--glass2)", color: "var(--text)", fontWeight: 700, cursor: "pointer", fontFamily: "var(--font)" }}>← Back</button>
      </Card>}
    </div>
  );

  // ═══ LOGIN ═══
  if (screen === "login") return shell(
    <div style={{ maxWidth: 460, margin: "0 auto", padding: 20, paddingTop: 40 }}>
      <div className="anim-fade" style={{ textAlign: "center", marginBottom: 36 }}>
        <div style={{ fontSize: 56, marginBottom: 12, animation: "float 3s ease-in-out infinite" }}>💳</div>
        <h1 style={{ fontSize: 32, fontFamily: "var(--font2)", fontWeight: 900, background: "linear-gradient(135deg, #6C5CE7, #00D2FF)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Family Finance</h1>
        <p style={{ color: "var(--text3)", fontSize: 14, marginTop: 6 }}>Who's logging in?</p>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
        {st?.members?.map((m, i) => (
          <Card key={m.id} delay={i * 80} onClick={() => { setMe(m); setScreen("member"); localStorage.setItem("ff-stay5", JSON.stringify({ type: "member", id: m.id })); setLogged({ type: "member", id: m.id }); }} style={{ padding: 16, cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
            <Avatar member={m} size={68} fontSize={32} />
            <div style={{ flex: 1 }}><div style={{ fontWeight: 800, fontSize: 17 }}>{m.name}</div><div style={{ fontSize: 12, color: "var(--text3)" }}>Tap to log in</div></div>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: m.color, boxShadow: `0 0 10px ${m.color}66` }} />
          </Card>
        ))}
      </div>
      <Card delay={300} style={{ textAlign: "center" }}>
        <div style={{ fontSize: 14, fontWeight: 800, color: "var(--text3)", marginBottom: 16 }}>👑 Admin Dashboard</div>
        <PinPad label="Enter Admin PIN" onSubmit={(pin) => { if (pin === st.adminPin) { setScreen("admin"); localStorage.setItem("ff-stay5", JSON.stringify({ type: "admin" })); setLogged({ type: "admin" }); } else showToast("Wrong PIN", "danger"); }} />
      </Card>
    </div>
  );

  // ═══ MEMBER ═══
  if (screen === "member" && me) {
    const myExps = memExps(me.id); const myTotal = myExps.reduce((s, e) => s + e.amount, 0);
    const todayTotal = myExps.filter(e => e.date === todayKey()).reduce((s, e) => s + e.amount, 0);
    const mySubs = st.subscriptions.filter(s => s.memberId === me.id); const myRecs = getRecs(me.id);
    return shell(<>
      <div className="anim-fade" style={{ padding: "18px 20px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <Avatar member={me} size={56} fontSize={26} editable onPhotoChange={(photo) => updateMemberPhoto(me.id, photo)} />
          <div><div style={{ fontWeight: 800, fontSize: 16 }}>{me.name}</div><div style={{ fontSize: 11, color: "var(--text3)" }}>Today: {fmt(todayTotal)}</div></div>
        </div>
        <button onClick={logout} className="btn-press" style={{ padding: "8px 16px", borderRadius: 12, border: "1px solid var(--border2)", background: "var(--glass2)", color: "var(--text3)", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "var(--font)" }}>Logout</button>
      </div>
      <div style={{ padding: "16px 18px", maxWidth: 540, margin: "0 auto", paddingBottom: 20 }}>
        <Card delay={50} style={{ background: `linear-gradient(135deg, ${me.color}cc, ${me.color}88)`, border: "none", marginBottom: 16, position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: -30, right: -30, width: 100, height: 100, borderRadius: "50%", background: "rgba(255,255,255,0.08)" }} />
          <div style={{ position: "relative" }}><MonthNav /><div style={{ textAlign: "center", color: "#fff" }}><div style={{ fontSize: 12, opacity: 0.8 }}>My spending this month</div><div style={{ fontSize: 36, fontWeight: 900, fontFamily: "var(--font2)", textShadow: "0 2px 10px rgba(0,0,0,0.2)" }}>{fmt(myTotal)}</div></div></div>
        </Card>
        <div className="anim-fade scroll-hide" style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto", animationDelay: "100ms" }}>
          {[{ id: "add", icon: "➕", l: "Add" }, { id: "history", icon: "📋", l: "History" }, { id: "subs", icon: "🔄", l: "Subs" }, { id: "tips", icon: "💡", l: "Tips" }].map(t => (
            <button key={t.id} onClick={() => setMTab(t.id)} className="btn-press" style={{ flex: 1, padding: "10px 6px", borderRadius: 14, border: mTab === t.id ? `2px solid ${me.color}` : "1px solid var(--border)", background: mTab === t.id ? me.color + "18" : "var(--glass)", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minWidth: 72 }}>
              <span style={{ fontSize: 18 }}>{t.icon}</span><span style={{ fontSize: 10, fontWeight: 700, color: mTab === t.id ? me.color : "var(--text3)" }}>{t.l}</span>

        {mTab === "add" && <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Card delay={50}><Section icon="🏷️" title="Category"><div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {CATS.map(c => <button key={c.id} onClick={() => setAddCat(c.id)} className="btn-press" style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 14, border: addCat === c.id ? `2px solid ${c.color}` : "1px solid var(--border)", background: addCat === c.id ? c.color + "22" : "var(--glass)", cursor: "pointer" }}>
              <span style={{ fontSize: 16 }}>{c.icon}</span><span style={{ fontSize: 12, fontWeight: 700, color: addCat === c.id ? c.color : "var(--text3)" }}>{c.name}</span>
            </button>)}
          </div></Section></Card>
          {addCat && (() => { const cc = CATS.find(c => c.id === addCat); return <Card delay={0} style={{ borderColor: cc.color + "33" }}>
            <Section icon="💵" title="Amount">
              <AmountInput value={addAmt} onChange={setAddAmt} color={cc.color} large />
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 12 }}>{QUICK_AMOUNTS.map(a => <Pill key={a} label={fmtCompact(a)} active={addAmt === a} color={cc.color} onClick={() => setAddAmt(a)} small />)}</div>
              <div style={{ marginTop: 12 }}><Stepper value={addAmt} onChange={setAddAmt} step={addStep} color={cc.color} /></div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, justifyContent: "center", marginTop: 8 }}>{[1, 5, 10, 25, 50, 100, 250, 500].map(s => <Pill key={s} label={`±${s}`} active={addStep === s} color="var(--accent2)" onClick={() => setAddStep(s)} small />)}</div>
            </Section>
            <input value={addNote} onChange={e => setAddNote(e.target.value)} placeholder="Note (optional)..." style={{ width: "100%", padding: "12px 16px", borderRadius: 14, border: "1px solid var(--border2)", background: "rgba(0,0,0,0.3)", color: "var(--text)", fontSize: 14, fontFamily: "var(--font)", marginTop: 16, outline: "none" }} />
            <button onClick={addExpense} disabled={addAmt <= 0} className="btn-press" style={{ width: "100%", padding: 16, borderRadius: 16, border: "none", marginTop: 14, background: addAmt > 0 ? cc.grad : "var(--border)", color: "#fff", fontWeight: 800, fontSize: 16, cursor: addAmt > 0 ? "pointer" : "default", fontFamily: "var(--font)", opacity: addAmt > 0 ? 1 : 0.4, boxShadow: addAmt > 0 ? `0 6px 24px ${cc.color}44` : "none" }}>Add Expense →</button>
          </Card>; })()}
        </div>}

        {mTab === "history" && <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {myExps.length === 0 && <Card><p style={{ color: "var(--text3)", textAlign: "center" }}>No expenses this month</p></Card>}
          {[...myExps].reverse().map((e, i) => { const cat = CATS.find(c => c.id === e.category); return <Card key={e.id} delay={i * 40} style={{ padding: 14, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}><div style={{ width: 42, height: 42, borderRadius: 14, background: (cat?.color || "#999") + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{cat?.icon}</div><div><div style={{ fontWeight: 700, fontSize: 14 }}>{cat?.name}</div><div style={{ fontSize: 11, color: "var(--text3)" }}>{e.date}{e.note ? ` · ${e.note}` : ""}</div></div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}><div style={{ fontWeight: 900, fontSize: 15, color: cat?.color }}>{fmt(e.amount)}</div><button onClick={() => delExp(e.id)} className="btn-press" style={{ width: 28, height: 28, borderRadius: 10, border: "none", background: "var(--danger)22", color: "var(--danger)", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>×</button></div>

        {mTab === "subs" && <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

            <AmountInput value={subAmt} onChange={setSubAmt} color="var(--accent)" />
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>{[9.99,14.99,19.99,29.99,39.99,49.99,99.99,149.99,199.99,299.99].map(a => <Pill key={a} label={a.toFixed(2)} active={subAmt === a} color="var(--accent)" onClick={() => setSubAmt(a)} small />)}</div>
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button onClick={() => setShowSub(false)} className="btn-press" style={{ flex: 1, padding: 14, borderRadius: 14, border: "1px solid var(--border2)", background: "var(--glass2)", color: "var(--text)", fontWeight: 700, cursor: "pointer", fontFamily: "var(--font)" }}>Cancel</button>
              <button onClick={addSub} className="btn-press" style={{ flex: 2, padding: 14, borderRadius: 14, border: "none", background: "linear-gradient(135deg, var(--accent), #8B5CF6)", color: "#fff", fontWeight: 800, cursor: "pointer", fontFamily: "var(--font)", boxShadow: "0 4px 18px rgba(108,92,231,0.4)" }}>Add</button>
            </div>
          </Section></Card>}
          {mySubs.map((s, i) => { const cat = CATS.find(c => c.id === s.category); return <Card key={s.id} delay={i * 50} style={{ padding: 14, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontSize: 22 }}>{cat?.icon || "📱"}</span><div><div style={{ fontWeight: 700, fontSize: 14 }}>{s.name}</div><div style={{ fontSize: 11, color: "var(--text3)" }}>{s.period} · {cat?.name}</div></div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ fontWeight: 900, fontSize: 14, color: "var(--accent)" }}>{fmt(s.amount)}</div><button onClick={() => delSub(s.id)} className="btn-press" style={{ width: 28, height: 28, borderRadius: 10, border: "none", background: "var(--danger)22", color: "var(--danger)", cursor: "pointer", fontSize: 14 }}>×</button></div>
          </Card>; })}
        </div>}

        {mTab === "tips" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Card delay={0} style={{ background: `linear-gradient(135deg, ${me.color}44, var(--accent)33)`, border: `1px solid ${me.color}33` }}>
            <div style={{ fontSize: 20, fontWeight: 900, fontFamily: "var(--font2)" }}>Your Insights</div>
            <div style={{ fontSize: 13, color: "var(--text2)", marginTop: 4 }}>Personalized tips based on your spending</div>
          </Card>
          {myRecs.map((r, i) => { const tc = { danger: "var(--danger)", warning: "var(--warn)", success: "var(--good)", info: "var(--accent2)" }; return <Card key={i} delay={i * 60} style={{ borderLeft: `4px solid ${tc[r.type]}`, paddingLeft: 16 }}><div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}><span style={{ fontSize: 22, flexShrink: 0 }}>{r.icon}</span><p style={{ fontSize: 13, color: "var(--text2)", lineHeight: 1.6, margin: 0 }}>{r.text}</p></div></Card>; })}
        </div>}
      </div>
    </>);
  }

  // ═══ ADMIN ═══
  if (screen === "admin") {
    const inc = st.monthlyIncome; const remaining = inc - monthTotal - monthSubs;
    const incPct = inc > 0 ? ((monthTotal + monthSubs) / inc) * 100 : 0;
    const memData = st.members.map(m => ({ ...m, total: memExps(m.id).reduce((s, e) => s + e.amount, 0), exps: memExps(m.id) }));
    const chartData = CATS.map(c => ({ ...c, value: catTotals[c.id] || 0 })).filter(d => d.value > 0);
    const dailyData = {}; mExps.forEach(e => { const d = e.date.split("-")[2]; dailyData[d] = (dailyData[d] || 0) + e.amount; });
    const maxDaily = Math.max(...Object.values(dailyData), 1);
    const adminRecs = getRecs();

    return shell(<>
      <div className="anim-fade" style={{ padding: "18px 20px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid var(--border)" }}>
        <div><div style={{ fontWeight: 900, fontSize: 20, fontFamily: "var(--font2)", background: "linear-gradient(135deg, #6C5CE7, #00D2FF)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>👑 Admin</div><div style={{ fontSize: 11, color: "var(--text3)" }}>{st.members.length} members · {fmt(inc)}/mo</div></div>
        <button onClick={logout} className="btn-press" style={{ padding: "8px 16px", borderRadius: 12, border: "1px solid var(--border2)", background: "var(--glass2)", color: "var(--text3)", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "var(--font)" }}>Logout</button>
      </div>
      <div style={{ padding: "16px 18px", maxWidth: 580, margin: "0 auto", paddingBottom: 20 }}>
        <MonthNav />
        <div className="anim-fade scroll-hide" style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
          {[{ id: "overview", icon: "📊", l: "Overview" }, { id: "members", icon: "👥", l: "Members" }, { id: "daily", icon: "📅", l: "Daily" }, { id: "subs", icon: "🔄", l: "Subs" }, { id: "tips", icon: "💡", l: "Tips" }, { id: "settings", icon: "⚙️", l: "Settings" }].map(t => (
            <button key={t.id} onClick={() => setATab(t.id)} className="btn-press" style={{ padding: "9px 16px", borderRadius: 14, border: aTab === t.id ? "2px solid var(--accent)" : "1px solid var(--border)", background: aTab === t.id ? "var(--accent)18" : "var(--glass)", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap" }}>
              <span style={{ fontSize: 15 }}>{t.icon}</span><span style={{ fontSize: 12, fontWeight: 700, color: aTab === t.id ? "var(--accent)" : "var(--text3)" }}>{t.l}</span>
            </button>
          ))}
        </div>

        {aTab === "overview" && <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Card delay={0} style={{ textAlign: "center", padding: 16 }}><div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 6 }}>Total Spent</div><div style={{ fontSize: 24, fontWeight: 900, color: "var(--danger)", fontFamily: "var(--font2)" }}>{fmt(monthTotal)}</div><div style={{ marginTop: 8 }}><MiniBar pct={incPct} color={incPct > 90 ? "var(--danger)" : incPct > 70 ? "var(--warn)" : "var(--accent)"} /></div><div style={{ fontSize: 10, color: "var(--text3)", marginTop: 4 }}>{incPct.toFixed(0)}% of income</div></Card>
            <Card delay={60} style={{ textAlign: "center", padding: 16 }}><div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 6 }}>Remaining</div><div style={{ fontSize: 24, fontWeight: 900, color: remaining >= 0 ? "var(--good)" : "var(--danger)", fontFamily: "var(--font2)" }}>{fmt(Math.abs(remaining))}</div><div style={{ marginTop: 8 }}><MiniBar pct={remaining >= 0 ? (remaining / Math.max(inc, 1)) * 100 : 0} color="var(--good)" /></div><div style={{ fontSize: 10, color: "var(--text3)", marginTop: 4 }}>{remaining < 0 ? "Over budget!" : "Available"}</div></Card>
          </div>
          <Card delay={120} style={{ textAlign: "center", padding: 16, background: "linear-gradient(135deg, rgba(108,92,231,0.12), rgba(0,210,255,0.08))", border: "1px solid rgba(108,92,231,0.2)" }}><div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 4 }}>Subscriptions (monthly)</div><div style={{ fontSize: 22, fontWeight: 900, color: "var(--accent2)", fontFamily: "var(--font2)" }}>~{fmt(Math.round(monthSubs * 100) / 100)}</div></Card>
          <Card delay={180}><Section icon="📊" title="By Category">
            {chartData.length === 0 ? <p style={{ color: "var(--text3)", textAlign: "center", fontSize: 13 }}>No expenses yet</p> : <>
              {/* Stacked bar at top */}
              <div style={{ display: "flex", height: 14, borderRadius: 7, overflow: "hidden", marginBottom: 16 }}>
                {chartData.map(d => <div key={d.id} style={{ width: `${(d.value / monthTotal) * 100}%`, background: d.color, transition: "width 0.6s cubic-bezier(.22,1,.36,1)", minWidth: d.value > 0 ? 4 : 0 }} />)}
              </div>
              {/* Category rows */}
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {chartData.sort((a, b) => b.value - a.value).map(d => {
                  const pct = monthTotal > 0 ? ((d.value / monthTotal) * 100).toFixed(0) : 0;
                  return (
                    <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 18, width: 28, textAlign: "center" }}>{d.icon}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text2)" }}>{d.name}</span>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ fontSize: 11, color: "var(--text3)", fontWeight: 600 }}>{pct}%</span>
                            <span style={{ fontSize: 12, fontWeight: 900, color: d.color }}>{fmt(d.value)}</span>
                          </div>
                        </div>
                        <MiniBar pct={parseFloat(pct)} color={d.color} height={8} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </>}
          </Section></Card>
          <Card delay={240}><Section icon="👥" title="By Member">{memData.sort((a, b) => b.total - a.total).map((m, i) => <div key={m.id} className="anim-fade" style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12, animationDelay: `${240 + i * 60}ms` }}><Avatar member={m} size={46} fontSize={22} /><div style={{ flex: 1 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ fontSize: 13, fontWeight: 700 }}>{m.name}</span><span style={{ fontSize: 13, fontWeight: 900, color: m.color }}>{fmt(m.total)}</span></div><MiniBar pct={monthTotal > 0 ? (m.total / monthTotal) * 100 : 0} color={m.color} /></div></div>)}</Section></Card>
        </div>}

        {aTab === "members" && <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>{memData.map((m, mi) => { const mCats = {}; m.exps.forEach(e => mCats[e.category] = (mCats[e.category] || 0) + e.amount); const top = Object.entries(mCats).sort((a, b) => b[1] - a[1]).slice(0, 5); return <Card key={m.id} delay={mi * 80}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}><Avatar member={m} size={64} fontSize={30} editable onPhotoChange={(photo) => updateMemberPhoto(m.id, photo)} /><div style={{ flex: 1 }}><div style={{ fontWeight: 800, fontSize: 17 }}>{m.name}</div><div style={{ fontSize: 12, color: "var(--text3)" }}>{m.exps.length} transactions{m.photo ? "" : " · Tap 📷 to add photo"}</div></div><div style={{ fontWeight: 900, fontSize: 20, color: m.color, fontFamily: "var(--font2)" }}>{fmt(m.total)}</div></div>
          {top.length ? top.map(([cid, amt]) => { const cat = CATS.find(c => c.id === cid); return <div key={cid} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}><span style={{ fontSize: 15, width: 24, textAlign: "center" }}>{cat?.icon}</span><div style={{ flex: 1 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}><span style={{ fontSize: 12, color: "var(--text3)" }}>{cat?.name}</span><span style={{ fontSize: 12, fontWeight: 800 }}>{fmt(amt)}</span></div><MiniBar pct={m.total > 0 ? (amt / m.total) * 100 : 0} color={cat?.color || "#999"} /></div></div>; }) : <p style={{ color: "var(--text3)", fontSize: 13, textAlign: "center" }}>No expenses yet</p>}
        </Card>; })}</div>}

        {aTab === "daily" && <Card><Section icon="📅" title="Daily Spending">{Object.keys(dailyData).length === 0 ? <p style={{ color: "var(--text3)", textAlign: "center" }}>No data this month</p> : <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{Array.from({ length: 31 }, (_, i) => i + 1).filter(d => dailyData[String(d).padStart(2, "0")]).map(d => { const amt = dailyData[String(d).padStart(2, "0")]; return <div key={d} style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 12, color: "var(--text3)", width: 26, textAlign: "right", fontWeight: 600 }}>{d}</span><div style={{ flex: 1, height: 12, borderRadius: 6, background: "rgba(255,255,255,0.04)", overflow: "hidden" }}><div style={{ height: "100%", borderRadius: 6, width: `${(amt / maxDaily) * 100}%`, background: "linear-gradient(90deg, var(--accent), var(--accent2))", transition: "width 0.5s", boxShadow: "0 0 8px rgba(108,92,231,0.3)" }} /></div><span style={{ fontSize: 12, fontWeight: 800, minWidth: 80, textAlign: "right" }}>{fmt(amt)}</span></div>; })}</div>}</Section></Card>}

        {aTab === "subs" && <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <Card delay={0} style={{ textAlign: "center", background: "linear-gradient(135deg, rgba(108,92,231,0.12), rgba(0,210,255,0.08))", border: "1px solid rgba(108,92,231,0.2)" }}><div style={{ fontSize: 12, color: "var(--text3)" }}>Total Monthly Cost</div><div style={{ fontSize: 28, fontWeight: 900, color: "var(--accent2)", fontFamily: "var(--font2)", marginTop: 4 }}>~{fmt(Math.round(monthSubs * 100) / 100)}</div><div style={{ fontSize: 11, color: "var(--text3)", marginTop: 2 }}>{st.subscriptions.length} subscriptions</div></Card>
          {st.subscriptions.map((s, i) => { const cat = CATS.find(c => c.id === s.category); const mem = st.members.find(m => m.id === s.memberId); return <Card key={s.id} delay={i * 50} style={{ padding: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}><div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontSize: 22 }}>{cat?.icon || "📱"}</span><div><div style={{ fontWeight: 700, fontSize: 14 }}>{s.name}</div><div style={{ fontSize: 11, color: "var(--text3)" }}>{s.period} · {mem?.name || "Admin"}</div></div></div><div style={{ fontWeight: 900, fontSize: 15, color: "var(--accent)" }}>{fmt(s.amount)}<span style={{ fontSize: 10, color: "var(--text3)", fontWeight: 600 }}>/{s.period === "Yearly" ? "yr" : s.period === "Weekly" ? "wk" : "mo"}</span></div></Card>; })}
          {st.subscriptions.length === 0 && <Card><p style={{ color: "var(--text3)", textAlign: "center" }}>No subscriptions yet</p></Card>}
        </div>}

        {aTab === "tips" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Card delay={0} style={{ background: "linear-gradient(135deg, rgba(108,92,231,0.15), rgba(0,210,255,0.1))", border: "1px solid rgba(108,92,231,0.2)" }}><div style={{ fontSize: 22, fontWeight: 900, fontFamily: "var(--font2)" }}>Smart Insights</div><div style={{ fontSize: 13, color: "var(--text2)", marginTop: 4 }}>Recommendations based on {MONTHS[selMonth]} family spending</div></Card>
          {adminRecs.map((r, i) => { const tc = { danger: "var(--danger)", warning: "var(--warn)", success: "var(--good)", info: "var(--accent2)" }; return <Card key={i} delay={i * 60} style={{ borderLeft: `4px solid ${tc[r.type]}`, paddingLeft: 16 }}><div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}><span style={{ fontSize: 22, flexShrink: 0 }}>{r.icon}</span><p style={{ fontSize: 13, color: "var(--text2)", lineHeight: 1.6, margin: 0 }}>{r.text}</p></div></Card>; })}
        </div>}

        {aTab === "settings" && <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Card delay={0}><Section icon="💵" title="Monthly Income">
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>{[5000,10000,15000,20000,25000,30000,40000,50000].map(v => <Pill key={v} label={fmtCompact(v)} active={st.monthlyIncome === v} color="var(--accent)" onClick={() => persist(p => ({ ...p, monthlyIncome: v }))} small />)}</div>
            <AmountInput value={st.monthlyIncome} onChange={v => persist(p => ({ ...p, monthlyIncome: v }))} color="var(--accent)" large />
            <div style={{ marginTop: 10 }}><Stepper value={st.monthlyIncome} onChange={v => persist(p => ({ ...p, monthlyIncome: v }))} step={1000} color="var(--accent)" /></div>
          </Section></Card>
          <Card delay={80}><Section icon="👥" title={`Members (${st.members.length})`}>{st.members.map(m => <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: "1px solid var(--border)" }}>
            <Avatar member={m} size={52} fontSize={24} editable onPhotoChange={(photo) => updateMemberPhoto(m.id, photo)} />
            <span style={{ fontWeight: 700, fontSize: 15, flex: 1 }}>{m.name}</span>
            {m.photo && <button onClick={() => removeMemberPhoto(m.id)} className="btn-press" style={{ padding: "4px 10px", borderRadius: 8, border: "none", background: "var(--danger)22", color: "var(--danger)", cursor: "pointer", fontSize: 10, fontWeight: 700 }}>Remove photo</button>}
            <div style={{ width: 12, height: 12, borderRadius: "50%", background: m.color, boxShadow: `0 0 8px ${m.color}66` }} />
          </div>)}</Section></Card>
          <Card delay={160} style={{ borderColor: "var(--danger)33" }}><Section icon="🗑️" title="Danger Zone"><button onClick={() => { if (confirm("Reset ALL data?")) { const f = blank(); setSt(f); save(f); localStorage.removeItem("ff-stay5"); setScreen("setup"); setSetupStep(0); } }} className="btn-press" style={{ width: "100%", padding: 14, borderRadius: 14, border: "2px solid var(--danger)", background: "var(--danger)11", color: "var(--danger)", fontWeight: 800, cursor: "pointer", fontFamily: "var(--font)" }}>Reset Everything</button></Section></Card>
        </div>}
      </div>
    </>);
  }
  return null;
}

// Mount the app
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
