        if (loading) {
          const l = JSON.parse(localStorage.getItem("ff-login") || "null");
          if (l?.type === "admin") setScreen("admin");
          else if (l?.type === "member") {
            const m = parsed.members.find(x => x.id === l.id);
            if (m) { setMe(m); setScreen("member"); }
          }
        }
      } else {
        setSt(null);
        setScreen("setup");
      }
      setLoading(false);
    });
    return () => ref.off();
  }, []);

  // Update me when st changes
  useEffect(() => {
    if (me && st?.members) {
      const updated = st.members.find(m => m.id === me.id);
      if (updated) setMe(updated);
    }
  }, [st]);

  // ── Firebase write helpers ──
  const fbSave = (data) => db.ref("familyData").set({
    ...data,
    members: data.members.reduce((o, m) => { o[m.id] = m; return o; }, {}),
    expenses: data.expenses.reduce((o, e) => { o[e.id] = e; return o; }, {}),
    subscriptions: data.subscriptions.reduce((o, s) => { o[s.id] = s; return o; }, {}),
  });

  const persist = (fn) => {
    const next = fn(st || { members:[], expenses:[], subscriptions:[], monthlyIncome:0, adminPin:"1234", setupDone:false });
    fbSave(next);
  };

  // ── Derived ──
  const mk = monthKey(selMonth, selYear);
  const mExps = useMemo(() => (st?.expenses || []).filter(e => e.date?.startsWith(mk)), [st?.expenses, mk]);
  const memExps = useCallback((mid) => mExps.filter(e => e.memberId === mid), [mExps]);
  const catTotals = useMemo(() => { const m = {}; CATS.forEach(c => m[c.id] = 0); mExps.forEach(e => m[e.category] = (m[e.category]||0) + e.amount); return m; }, [mExps]);
  const monthTotal = useMemo(() => mExps.reduce((s, e) => s + e.amount, 0), [mExps]);
  const monthSubs = useMemo(() => (st?.subscriptions || []).reduce((s, sub) => s + (sub.period === "Monthly" ? sub.amount : sub.period === "Yearly" ? sub.amount/12 : sub.amount*4.33), 0), [st?.subscriptions]);

  // ── Actions ──
  const addExpense = () => { if(!addCat||addAmt<=0)return; persist(p=>({...p,expenses:[...p.expenses,{id:Date.now().toString(),memberId:me.id,memberName:me.name,category:addCat,amount:addAmt,note:addNote,date:todayKey(),timestamp:Date.now()}]})); showToast(fmt(addAmt)+" "+t.added); setAddCat(null);setAddAmt(0);setAddNote(""); };
  const addSub = () => { if(!subName.trim()||subAmt<=0)return; persist(p=>({...p,subscriptions:[...p.subscriptions,{id:Date.now().toString(),memberId:me?.id||"admin",name:subName,category:subCat,amount:subAmt,period:subPer}]})); showToast('"'+subName+'" added'); setShowSub(false);setSubName("");setSubAmt(0); };
  const delSub = (id) => persist(p=>({...p,subscriptions:p.subscriptions.filter(s=>s.id!==id)}));
  const delExp = (id) => persist(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
  const logout = () => { setScreen("login");setMe(null);localStorage.removeItem("ff-login"); };
  const updateMemberPhoto = (mid, photo) => { persist(p=>({...p,members:p.members.map(m=>m.id===mid?{...m,photo}:m)})); showToast("Photo updated!"); };
  const prevMonth = () => { if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1)}else setSelMonth(m=>m-1) };
  const nextMonth = () => { if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1)}else setSelMonth(m=>m+1) };

  // ── Recommendations ──
  const getRecs = (memberId=null) => {
    const exps = memberId ? memExps(memberId) : mExps;
    const total = exps.reduce((s,e)=>s+e.amount,0);
    const inc = st?.monthlyIncome||0;
    const subs = (st?.subscriptions||[]).filter(s=>!memberId||s.memberId===memberId);
    const subTot = subs.reduce((s,sub)=>s+(sub.period==="Monthly"?sub.amount:sub.period==="Yearly"?sub.amount/12:sub.amount*4.33),0);
    const cats = {}; exps.forEach(e=>cats[e.category]=(cats[e.category]||0)+e.amount);
    const remaining = inc-monthTotal-monthSubs;
    const recs = [];
    if(total===0){recs.push({icon:"📝",text:"No expenses yet. Start tracking to unlock insights!",type:"info"});return recs}
    if(!memberId&&remaining<0) recs.push({icon:"🚨",text:"Over budget by "+fmt(Math.abs(remaining))+"! Review spending.",type:"danger"});
    if(!memberId&&remaining>=0&&(monthTotal+monthSubs)>inc*0.85) recs.push({icon:"⚠️",text:((monthTotal+monthSubs)/inc*100).toFixed(0)+"% of income used. Tighten spending.",type:"warning"});
    const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
    if(sorted.length){const t=sorted[0];const c=CATS.find(x=>x.id===t[0]);recs.push({icon:c?.icon||"📊",text:"Biggest spend: "+c?.name+" at "+fmt(t[1])+" ("+(t[1]/total*100).toFixed(0)+"%)",type:"info"})}
    if((cats.dining||0)>(cats.groceries||0)&&(cats.dining||0)>0) recs.push({icon:"🍳",text:"Dining out exceeds groceries. Cooking saves 40-60%.",type:"warning"});
    if(subTot>(memberId?total*0.2:inc*0.12)) recs.push({icon:"📱",text:"Subscriptions cost ~"+fmt(Math.round(subTot*100)/100)+"/mo. Audit for savings.",type:"warning"});
    if(!memberId&&(cats.savings||0)<inc*0.1&&inc>0) recs.push({icon:"🐖",text:"Only "+((cats.savings||0)/inc*100).toFixed(0)+"% to savings. Aim for 10-20%.",type:"warning"});
    if(!memberId&&(cats.savings||0)>=inc*0.2) recs.push({icon:"🏆",text:((cats.savings||0)/inc*100).toFixed(0)+"% savings rate — excellent!",type:"success"});
    if(!memberId&&remaining>inc*0.2&&remaining>0) recs.push({icon:"💰",text:fmt(remaining)+" remaining — consider investing.",type:"success"});
    if(!memberId&&st.members.length>1){const md=st.members.map(m=>({...m,t:memExps(m.id).reduce((s,e)=>s+e.amount,0)})).sort((a,b)=>b.t-a.t);recs.push({icon:md[0].avatar,text:md[0].name+" spent the most ("+fmt(md[0].t)+"). Avg: "+fmt(Math.round(monthTotal/st.members.length*100)/100),type:"info"})}
    return recs;
  };

  // ── Shared UI ──
  const SyncBadge = () => <span style={{fontSize:11,color:"var(--text3)",display:"flex",alignItems:"center"}}><span className={"sync-dot "+(connected?"sync-on":"sync-off")}/>{connected?"Synced":"Offline"}</span>;

    <button onClick={prevMonth} className="bp" style={{width:36,height:36,borderRadius:12,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text)",cursor:"pointer",fontSize:16,fontWeight:700}}>‹</button>

    <button onClick={nextMonth} className="bp" style={{width:36,height:36,borderRadius:12,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text)",cursor:"pointer",fontSize:16,fontWeight:700}}>›</button>

        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={()=>setSetupStep(0)} className="bp" style={{flex:1,padding:14,borderRadius:14,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text)",fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>← Back</button>
          <button onClick={()=>setupMems.every(m=>m.name.trim())?setSetupStep(2):showToast("Name all members","warning")} className="bp" style={{flex:2,padding:14,borderRadius:14,border:"none",background:"linear-gradient(135deg,var(--accent),#8B5CF6)",color:"#fff",fontWeight:800,cursor:"pointer",fontFamily:"var(--font)",boxShadow:"0 6px 20px rgba(108,92,231,0.4)"}}>Next →</button>
        </div>
      </Section></Card>}

      {setupStep===2&&<Card delay={100} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
        <Section icon="🔒" title="Set Admin PIN">
          <p style={{color:"var(--text3)",fontSize:13,textAlign:"center",marginBottom:20}}>Protect the admin dashboard.</p>
          <PinPad label="Choose your PIN" onSubmit={(pin)=>{
            const mems=setupMems.filter(m=>m.name.trim()).map((m,i)=>({id:"m"+Date.now()+"-"+i,name:m.name.trim(),avatar:m.avatar,color:m.color,photo:null}));
            const ns={members:mems,expenses:[],subscriptions:[],monthlyIncome:setupInc,adminPin:pin,setupDone:true};
            fbSave(ns);
            showToast("All set! 🎉");
          }}/>
        </Section>
        <button onClick={()=>setSetupStep(1)} className="bp" style={{marginTop:18,padding:"10px 28px",borderRadius:12,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text)",fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>← Back</button>
      </Card>}
    </div>
  );

  // ═══ LOGIN ═══
  if(screen==="login") return shell(
    <div style={{maxWidth:460,margin:"0 auto",padding:20,paddingTop:40}}>
      <div className="af" style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontSize:56,marginBottom:12,animation:"float 3s ease-in-out infinite"}}>💳</div>
        <h1 style={{fontSize:32,fontFamily:"var(--font2)",fontWeight:900,background:"linear-gradient(135deg,#6C5CE7,#00D2FF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Family Finance</h1>
        <p style={{color:"var(--text3)",fontSize:14,marginTop:6}}>Who's logging in?</p>
        <SyncBadge/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
        {st?.members?.map((m,i)=>
          <Card key={m.id} delay={i*80} onClick={()=>{setMe(m);setScreen("member");localStorage.setItem("ff-login",JSON.stringify({type:"member",id:m.id}))}} style={{padding:16,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <Avatar member={m} size={68} fontSize={32}/>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:17}}>{m.name}</div><div style={{fontSize:12,color:"var(--text3)"}}>Tap to log in</div></div>
            <div style={{width:10,height:10,borderRadius:"50%",background:m.color,boxShadow:"0 0 10px "+m.color+"66"}}/>
          </Card>
        )}
      </div>
      <Card delay={300} style={{textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:800,color:"var(--text3)",marginBottom:16}}>👑 Admin Dashboard</div>
        <PinPad label="Enter Admin PIN" onSubmit={(pin)=>{if(pin===st.adminPin){setScreen("admin");localStorage.setItem("ff-login",JSON.stringify({type:"admin"}))}else showToast("Wrong PIN","danger")}}/>
      </Card>
    </div>
  );

  // ═══ MEMBER ═══
  if(screen==="member"&&me){
    const myExps=memExps(me.id),myTotal=myExps.reduce((s,e)=>s+e.amount,0);
    const todayTotal=myExps.filter(e=>e.date===todayKey()).reduce((s,e)=>s+e.amount,0);
    const mySubs=st.subscriptions.filter(s=>s.memberId===me.id),myRecs=getRecs(me.id);
    return shell(<>
      <div className="af" style={{padding:"18px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <Avatar member={me} size={56} fontSize={26} editable onPhotoChange={(p)=>updateMemberPhoto(me.id,p)}/>
          <div><div style={{fontWeight:800,fontSize:16}}>{me.name}</div><div style={{fontSize:11,color:"var(--text3)"}}>Today: {fmt(todayTotal)}</div><SyncBadge/></div>
        </div>
        <LangBtn lang={lang} setLang={setLang}/><button onClick={logout} className="bp" style={{padding:"8px 16px",borderRadius:12,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text3)",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>Logout</button>
      </div>
      <div style={{padding:"16px 18px",maxWidth:540,margin:"0 auto",paddingBottom:20}}>
        <Card delay={50} style={{background:"linear-gradient(135deg,"+me.color+"cc,"+me.color+"88)",border:"none",marginBottom:16,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-30,right:-30,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
          <div style={{position:"relative"}}><MonthNav/><div style={{textAlign:"center",color:"#fff"}}><div style={{fontSize:12,opacity:0.8}}>My spending this month</div><div style={{fontSize:36,fontWeight:900,fontFamily:"var(--font2)",textShadow:"0 2px 10px rgba(0,0,0,0.2)"}}>{fmt(myTotal)}</div></div></div>
        </Card>
        <div className="af sh" style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",animationDelay:"100ms"}}>
          {[{id:"add",icon:"➕",l:"Add"},{id:"history",icon:"📋",l:"History"},{id:"subs",icon:"🔄",l:"Subs"},{id:"tips",icon:"💡",l:"Tips"}].map(t=>
            <button key={t.id} onClick={()=>setMTab(t.id)} className="bp" style={{flex:1,padding:"10px 6px",borderRadius:14,border:mTab===t.id?"2px solid "+me.color:"1px solid var(--border)",background:mTab===t.id?me.color+"18":"var(--glass)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:72}}>

          </Card>})}
        </div>}

        {mTab==="subs"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {!showSub?<button onClick={()=>setShowSub(true)} className="bp" style={{width:"100%",padding:16,borderRadius:16,border:"2px dashed var(--border2)",background:"transparent",color:"var(--text3)",fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>+ Add Subscription</button>
          :<Card><Section icon="🔄" title="New Subscription">
            <input value={subName} onChange={e=>setSubName(e.target.value)} placeholder="Name (Netflix, Gym)..." style={{width:"100%",padding:"12px 16px",borderRadius:14,border:"1px solid var(--border2)",background:"rgba(0,0,0,0.3)",color:"var(--text)",fontSize:14,fontFamily:"var(--font)",marginBottom:12,outline:"none"}}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>{CATS.map(c=><Pill key={c.id} label={c.icon+" "+c.name} active={subCat===c.id} color={c.color} onClick={()=>setSubCat(c.id)} small/>)}</div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>{SUB_PERIODS.map(p=><Pill key={p} label={p} active={subPer===p} color="var(--accent2)" onClick={()=>setSubPer(p)}/>)}</div>
            <AmountInput value={subAmt} onChange={setSubAmt} color="var(--accent)"/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>{[9.99,14.99,19.99,29.99,39.99,49.99,99.99,149.99,199.99,299.99].map(a=><Pill key={a} label={a.toFixed(2)} active={subAmt===a} color="var(--accent)" onClick={()=>setSubAmt(a)} small/>)}</div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>setShowSub(false)} className="bp" style={{flex:1,padding:14,borderRadius:14,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text)",fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>Cancel</button>
              <button onClick={addSub} className="bp" style={{flex:2,padding:14,borderRadius:14,border:"none",background:"linear-gradient(135deg,var(--accent),#8B5CF6)",color:"#fff",fontWeight:800,cursor:"pointer",fontFamily:"var(--font)"}}>Add</button>
            </div>
          </Section></Card>}
          {mySubs.map((s,i)=>{const cat=CATS.find(c=>c.id===s.category);return <Card key={s.id} delay={i*50} style={{padding:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:22}}>{cat?.icon||"📱"}</span><div><div style={{fontWeight:700,fontSize:14}}>{s.name}</div><div style={{fontSize:11,color:"var(--text3)"}}>{s.period} · {cat?.name}</div></div></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{fontWeight:900,fontSize:14,color:"var(--accent)"}}>{fmt(s.amount)}</div><button onClick={()=>delSub(s.id)} className="bp" style={{width:28,height:28,borderRadius:10,border:"none",background:"var(--danger)22",color:"var(--danger)",cursor:"pointer",fontSize:14}}>×</button></div>
          </Card>})}
        </div>}

        {mTab==="tips"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card delay={0} style={{background:"linear-gradient(135deg,"+me.color+"44,var(--accent)33)",border:"1px solid "+me.color+"33"}}><div style={{fontSize:20,fontWeight:900,fontFamily:"var(--font2)"}}>Your Insights</div><div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>Tips based on your spending</div></Card>
          {myRecs.map((r,i)=>{const tc={danger:"var(--danger)",warning:"var(--warn)",success:"var(--good)",info:"var(--accent2)"};return <Card key={i} delay={i*60} style={{borderLeft:"4px solid "+tc[r.type],paddingLeft:16}}><div style={{display:"flex",alignItems:"flex-start",gap:10}}><span style={{fontSize:22,flexShrink:0}}>{r.icon}</span><p style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,margin:0}}>{r.text}</p></div></Card>})}
        </div>}
      </div>
    </>)
  }

  // ═══ ADMIN ═══
  if(screen==="admin"){
    const inc=st.monthlyIncome,remaining=inc-monthTotal-monthSubs,incPct=inc>0?((monthTotal+monthSubs)/inc)*100:0;
    const memData=st.members.map(m=>({...m,total:memExps(m.id).reduce((s,e)=>s+e.amount,0),exps:memExps(m.id)}));
    const chartData=CATS.map(c=>({...c,value:catTotals[c.id]||0})).filter(d=>d.value>0);
    const dailyData={};mExps.forEach(e=>{const d=e.date.split("-")[2];dailyData[d]=(dailyData[d]||0)+e.amount});
    const maxDaily=Math.max(...Object.values(dailyData),1);
    const adminRecs=getRecs();

    return shell(<>
      <div className="af" style={{padding:"18px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--border)"}}>
        <div><div style={{fontWeight:900,fontSize:20,fontFamily:"var(--font2)",background:"linear-gradient(135deg,#6C5CE7,#00D2FF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>👑 Admin</div><div style={{fontSize:11,color:"var(--text3)"}}>{st.members.length} members · {fmt(inc)}/mo</div><SyncBadge/></div>
        <LangBtn lang={lang} setLang={setLang}/><buttononClick={logout} className="bp" style={{padding:"8px 16px",borderRadius:12,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text3)",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>Logout</button>
      </div>
      <div style={{padding:"16px 18px",maxWidth:580,margin:"0 auto",paddingBottom:20}}>
        <MonthNav/>
        <div className="af sh" style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
          {[{id:"overview",icon:"📊",l:"Overview"},{id:"members",icon:"👥",l:"Members"},{id:"daily",icon:"📅",l:"Daily"},{id:"subs",icon:"🔄",l:"Subs"},{id:"tips",icon:"💡",l:"Tips"},{id:"settings",icon:"⚙️",l:"Settings"}].map(t=>
            <button key={t.id} onClick={()=>setATab(t.id)} className="bp" style={{padding:"9px 16px",borderRadius:14,border:aTab===t.id?"2px solid var(--accent)":"1px solid var(--border)",background:aTab===t.id?"var(--accent)18":"var(--glass)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
              <span style={{fontSize:15}}>{t.icon}</span><span style={{fontSize:12,fontWeight:700,color:aTab===t.id?"var(--accent)":"var(--text3)"}}>{t.l}</span>
            </button>
          )}
        </div>

        {aTab==="overview"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Card delay={0} style={{textAlign:"center",padding:16}}><div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>Total Spent</div><div style={{fontSize:24,fontWeight:900,color:"var(--danger)",fontFamily:"var(--font2)",direction:"ltr"}}>{fmt(monthTotal)}</div><div style={{marginTop:8}}><MiniBar pct={incPct} color={incPct>90?"var(--danger)":incPct>70?"var(--warn)":"var(--accent)"}/></div><div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>{incPct.toFixed(0)}% of income</div></Card>
            <Card delay={60} style={{textAlign:"center",padding:16}}><div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>Remaining</div><div style={{fontSize:24,fontWeight:900,color:remaining>=0?"var(--good)":"var(--danger)",fontFamily:"var(--font2)",direction:"ltr"}}>{fmt(Math.abs(remaining))}</div><div style={{marginTop:8}}><MiniBar pct={remaining>=0?(remaining/Math.max(inc,1))*100:0} color="var(--good)"/></div><div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>{remaining<0?"Over budget!":"Available"}</div></Card>
          </div>
          <Card delay={120} style={{textAlign:"center",padding:16,background:"linear-gradient(135deg,rgba(108,92,231,0.12),rgba(0,210,255,0.08))",border:"1px solid rgba(108,92,231,0.2)"}}><div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>Subscriptions (monthly)</div><div style={{fontSize:22,fontWeight:900,color:"var(--accent2)",fontFamily:"var(--font2)"}}>~{fmt(Math.round(monthSubs*100)/100)}</div></Card>
          <Card delay={180}><Section icon="📊" title="By Category">
            {chartData.length===0?<p style={{color:"var(--text3)",textAlign:"center",fontSize:13}}>No expenses yet</p>:<>
              <div style={{display:"flex",height:14,borderRadius:7,overflow:"hidden",marginBottom:16}}>{chartData.map(d=><div key={d.id} style={{width:(d.value/monthTotal)*100+"%",background:d.color,transition:"width 0.6s",minWidth:d.value>0?4:0}}/>)}</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>{chartData.sort((a,b)=>b.value-a.value).map(d=>{const pct=monthTotal>0?((d.value/monthTotal)*100).toFixed(0):0;return <div key={d.id} style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18,width:28,textAlign:"center"}}>{d.icon}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:600,color:"var(--text2)"}}>{d.name}</span><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>{pct}%</span><span style={{fontSize:12,fontWeight:900,color:d.color}}>{fmt(d.value)}</span></div></div><MiniBar pct={parseFloat(pct)} color={d.color} height={8}/></div></div>})}</div>
            </>}
          </Section></Card>
          <Card delay={240}><Section icon="👥" title="By Member">{memData.sort((a,b)=>b.total-a.total).map((m,i)=><div key={m.id} className="af" style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,animationDelay:(240+i*60)+"ms"}}><Avatar member={m} size={46} fontSize={22}/><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:700}}>{m.name}</span><span style={{fontSize:13,fontWeight:900,color:m.color}}>{fmt(m.total)}</span></div><MiniBar pct={monthTotal>0?(m.total/monthTotal)*100:0} color={m.color}/></div></div>)}</Section></Card>
        </div>}

        {aTab==="members"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>{memData.map((m,mi)=>{const mCats={};m.exps.forEach(e=>mCats[e.category]=(mCats[e.category]||0)+e.amount);const top=Object.entries(mCats).sort((a,b)=>b[1]-a[1]).slice(0,5);return <Card key={m.id} delay={mi*80}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}><Avatar member={m} size={64} fontSize={30} editable onPhotoChange={p=>updateMemberPhoto(m.id,p)}/><div style={{flex:1}}><div style={{fontWeight:800,fontSize:17}}>{m.name}</div><div style={{fontSize:12,color:"var(--text3)"}}>{m.exps.length} transactions</div></div><div style={{fontWeight:900,fontSize:20,color:m.color,fontFamily:"var(--font2)",direction:"ltr"}}>{fmt(m.total)}</div></div>
          {top.length?top.map(([cid,amt])=>{const cat=CATS.find(c=>c.id===cid);return <div key={cid} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{fontSize:15,width:24,textAlign:"center"}}>{cat?.icon}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,color:"var(--text3)"}}>{cat?.name}</span><span style={{fontSize:12,fontWeight:800}}>{fmt(amt)}</span></div><MiniBar pct={m.total>0?(amt/m.total)*100:0} color={cat?.color||"#999"}/></div></div>}):<p style={{color:"var(--text3)",fontSize:13,textAlign:"center"}}>No expenses yet</p>}
        </Card>})}</div>}

        {aTab==="daily"&&<Card><Section icon="📅" title="Daily Spending">{Object.keys(dailyData).length===0?<p style={{color:"var(--text3)",textAlign:"center"}}>No data this month</p>:<div style={{display:"flex",flexDirection:"column",gap:6}}>{Array.from({length:31},(_,i)=>i+1).filter(d=>dailyData[String(d).padStart(2,"0")]).map(d=>{const amt=dailyData[String(d).padStart(2,"0")];return <div key={d} style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:12,color:"var(--text3)",width:26,textAlign:"right",fontWeight:600}}>{d}</span><div style={{flex:1,height:12,borderRadius:6,background:"rgba(255,255,255,0.04)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,width:(amt/maxDaily)*100+"%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",transition:"width 0.5s",boxShadow:"0 0 8px rgba(108,92,231,0.3)"}}/></div><span style={{fontSize:12,fontWeight:800,minWidth:80,textAlign:"right"}}>{fmt(amt)}</span></div>})}</div>}</Section></Card>}

        {aTab==="subs"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Card delay={0} style={{textAlign:"center",background:"linear-gradient(135deg,rgba(108,92,231,0.12),rgba(0,210,255,0.08))",border:"1px solid rgba(108,92,231,0.2)"}}><div style={{fontSize:12,color:"var(--text3)"}}>Total Monthly Cost</div><div style={{fontSize:28,fontWeight:900,color:"var(--accent2)",fontFamily:"var(--font2)",marginTop:4}}>~{fmt(Math.round(monthSubs*100)/100)}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{st.subscriptions.length} subscriptions</div></Card>
          {st.subscriptions.map((s,i)=>{const cat=CATS.find(c=>c.id===s.category);const mem=st.members.find(m=>m.id===s.memberId);return <Card key={s.id} delay={i*50} style={{padding:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:22}}>{cat?.icon||"📱"}</span><div><div style={{fontWeight:700,fontSize:14}}>{s.name}</div><div style={{fontSize:11,color:"var(--text3)"}}>{s.period} · {(mem?.name||"Admin")}</div></div></div><div style={{fontWeight:900,fontSize:15,color:"var(--accent)"}}>{fmt(s.amount)}<span style={{fontSize:10,color:"var(--text3)",fontWeight:600}}>/{s.period==="Yearly"?"yr":s.period==="Weekly"?"wk":"mo"}</span></div></Card>})}
          {st.subscriptions.length===0&&<Card><p style={{color:"var(--text3)",textAlign:"center"}}>No subscriptions yet</p></Card>}
        </div>}

        {aTab==="tips"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card delay={0} style={{background:"linear-gradient(135deg,rgba(108,92,231,0.15),rgba(0,210,255,0.1))",border:"1px solid rgba(108,92,231,0.2)"}}><div style={{fontSize:22,fontWeight:900,fontFamily:"var(--font2)"}}>Smart Insights</div><div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>Recommendations for {MNAMES[selMonth]}</div></Card>
          {adminRecs.map((r,i)=>{const tc={danger:"var(--danger)",warning:"var(--warn)",success:"var(--good)",info:"var(--accent2)"};return <Card key={i} delay={i*60} style={{borderLeft:"4px solid "+tc[r.type],paddingLeft:16}}><div style={{display:"flex",alignItems:"flex-start",gap:10}}><span style={{fontSize:22,flexShrink:0}}>{r.icon}</span><p style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,margin:0}}>{r.text}</p></div></Card>})}
        </div>}

        {aTab==="settings"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Card delay={0}><Section icon="💵" title="Monthly Income">
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>{[5000,10000,15000,20000,25000,30000,40000,50000].map(v=><Pill key={v} label={fmtCompact(v)} active={st.monthlyIncome===v} color="var(--accent)" onClick={()=>persist(p=>({...p,monthlyIncome:v}))} small/>)}</div>
            <AmountInput value={st.monthlyIncome} onChange={v=>persist(p=>({...p,monthlyIncome:v}))} color="var(--accent)" large/>
            <div style={{marginTop:10}}><Stepper value={st.monthlyIncome} onChange={v=>persist(p=>({...p,monthlyIncome:v}))} step={1000} color="var(--accent)"/></div>
          </Section></Card>
          <Card delay={80}><Section icon="👥" title={"Members ("+st.members.length+")"}>{st.members.map(m=><div key={m.id} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 0",borderBottom:"1px solid var(--border)"}}>
            <Avatar member={m} size={52} fontSize={24} editable onPhotoChange={p=>updateMemberPhoto(m.id,p)}/>
            <span style={{fontWeight:700,fontSize:15,flex:1}}>{m.name}</span>
            <div style={{width:12,height:12,borderRadius:"50%",background:m.color,boxShadow:"0 0 8px "+m.color+"66"}}/>
          </div>)}</Section></Card>
          <Card delay={160} style={{borderColor:"var(--danger)33"}}><Section icon="🗑️" title="Danger Zone"><button onClick={()=>{if(confirm("Reset ALL data?")){db.ref("familyData").remove();localStorage.removeItem("ff-login")}}} className="bp" style={{width:"100%",padding:14,borderRadius:14,border:"2px solid var(--danger)",background:"var(--danger)11",color:"var(--danger)",fontWeight:800,cursor:"pointer",fontFamily:"var(--font)"}}>Reset Everything</button></Section></Card>
        </div>}
      </div>
    </>)
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
