  db.ref(".info/connected").on("value",s=>setConn(!!s.val()));
  ref.on("value",s=>{
    const d=s.val();
    if(d&&d.setupDone){
      const p={...d,members:d.members?Object.values(d.members):[],expenses:d.expenses?Object.values(d.expenses):[],subscriptions:d.subscriptions?Object.values(d.subscriptions):[]};
      setSt(p);
      if(ld){const l=JSON.parse(localStorage.getItem("ff-login")||"null");if(l?.type==="admin")setScr("admin");else if(l?.type==="member"){const m=p.members.find(x=>x.id===l.id);if(m){setMe(m);setScr("member")}}}
    }else{setSt(null);setScr("setup")}
    setLd(false);
  });
  return()=>ref.off();
},[]);

useEffect(()=>{if(me&&st?.members){const u=st.members.find(m=>m.id===me.id);if(u)setMe(u)}},[st]);

const fbS=data=>db.ref("familyData").set({...data,members:data.members.reduce((o,m)=>{o[m.id]=m;return o},{}),expenses:data.expenses.reduce((o,e)=>{o[e.id]=e;return o},{}),subscriptions:data.subscriptions.reduce((o,s)=>{o[s.id]=s;return o},{})});
const upd=fn=>{const nx=fn(st||{members:[],expenses:[],subscriptions:[],monthlyIncome:0,adminPin:"1234",setupDone:false});fbS(nx)};

const mk=mKey(selM,selY);
const mExps=useMemo(()=>(st?.expenses||[]).filter(e=>e.date?.startsWith(mk)),[st?.expenses,mk]);
const memE=useCallback(mid=>mExps.filter(e=>e.memberId===mid),[mExps]);
const catT=useMemo(()=>{const m={};CATS.forEach(c=>m[c.id]=0);mExps.forEach(e=>m[e.category]=(m[e.category]||0)+e.amount);return m},[mExps]);
const mTot=useMemo(()=>mExps.reduce((s,e)=>s+e.amount,0),[mExps]);
const mSubs=useMemo(()=>(st?.subscriptions||[]).reduce((s,sub)=>s+(sub.period==="Monthly"?sub.amount:sub.period==="Yearly"?sub.amount/12:sub.amount*4.33),0),[st?.subscriptions]);

const addExp=()=>{if(!aCat||aAmt<=0)return;upd(p=>({...p,expenses:[...p.expenses,{id:Date.now().toString(),memberId:me.id,memberName:me.name,category:aCat,amount:aAmt,note:aNote,date:tKey(),timestamp:Date.now()}]}));sT(fmt(aAmt)+" "+t.added);setACat(null);setAAmt(0);setANote("")};
const addSub=()=>{if(!sNm.trim()||sAmt<=0)return;upd(p=>({...p,subscriptions:[...p.subscriptions,{id:Date.now().toString(),memberId:me?.id||"admin",name:sNm,category:sCat,amount:sAmt,period:sPer}]}));sT('"'+sNm+'" '+t.added);setShowSub(false);setSNm("");setSAmt(0)};
const delSub=id=>upd(p=>({...p,subscriptions:p.subscriptions.filter(s=>s.id!==id)}));
const delExp=id=>upd(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
const lo=()=>{setScr("login");setMe(null);localStorage.removeItem("ff-login")};
const uPhoto=(mid,ph)=>{upd(p=>({...p,members:p.members.map(m=>m.id===mid?{...m,photo:ph}:m)}));sT(t.photoUp)};
const prevM=()=>{if(selM===0){setSelM(11);setSelY(y=>y-1)}else setSelM(m=>m-1)};
const nextM=()=>{if(selM===11){setSelM(0);setSelY(y=>y+1)}else setSelM(m=>m+1)};

const getRecs=(mid=null)=>{
  const exps=mid?memE(mid):mExps;const tot=exps.reduce((s,e)=>s+e.amount,0);const inc=st?.monthlyIncome||0;
  const subs=(st?.subscriptions||[]).filter(s=>!mid||s.memberId===mid);const subTot=subs.reduce((s,sub)=>s+(sub.period==="Monthly"?sub.amount:sub.period==="Yearly"?sub.amount/12:sub.amount*4.33),0);
  const cats={};exps.forEach(e=>cats[e.category]=(cats[e.category]||0)+e.amount);const rem=inc-mTot-mSubs;const recs=[];
  if(tot===0){recs.push({icon:"📝",text:t.noExpYet,type:"info"});return recs}
  if(!mid&&rem<0)recs.push({icon:"🚨",text:t.overBy+" "+fmt(Math.abs(rem))+t.reviewIt,type:"danger"});
  if(!mid&&rem>=0&&(mTot+mSubs)>inc*0.85)recs.push({icon:"⚠️",text:((mTot+mSubs)/inc*100).toFixed(0)+t.pctUsed,type:"warning"});
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  if(sorted.length){const tp=sorted[0];const c=CATS.find(x=>x.id===tp[0]);recs.push({icon:c?.icon||"📊",text:t.bigSpend+" "+cn(tp[0],t)+" "+fmt(tp[1])+" ("+(tp[1]/tot*100).toFixed(0)+"%)",type:"info"})}
  if((cats.dining||0)>(cats.groceries||0)&&(cats.dining||0)>0)recs.push({icon:"🍳",text:t.diningTip,type:"warning"});
  if(subTot>(mid?tot*0.2:inc*0.12))recs.push({icon:"📱",text:t.subsCost+fmt(Math.round(subTot*100)/100)+t.auditSubs,type:"warning"});
  if(!mid&&(cats.savings||0)<inc*0.1&&inc>0)recs.push({icon:"🐖",text:((cats.savings||0)/inc*100).toFixed(0)+t.lowSave,type:"warning"});
  if(!mid&&(cats.savings||0)>=inc*0.2)recs.push({icon:"🏆",text:((cats.savings||0)/inc*100).toFixed(0)+t.greatSave,type:"success"});
  if(!mid&&rem>inc*0.2&&rem>0)recs.push({icon:"💰",text:fmt(rem)+t.investTip,type:"success"});
  return recs;
};

const SB=()=><span style={{fontSize:11,color:"var(--text3)",display:"flex",alignItems:"center"}}><span className={"sd "+(conn?"on":"off")}/>{conn?t.synced:t.offline}</span>;

</div>;

    <div style={{display:"flex",gap:10,marginTop:16}}>
      <button onClick={()=>setSstp(0)} className="bp" style={{flex:1,padding:14,borderRadius:14,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text)",fontWeight:700,cursor:"pointer"}}>{t.back}</button>
      <button onClick={()=>sMem.every(m=>m.name.trim())?setSstp(2):sT(t.nameAll,"warning")} className="bp" style={{flex:2,padding:14,borderRadius:14,border:"none",background:"linear-gradient(135deg,var(--accent),#8B5CF6)",color:"#fff",fontWeight:800,cursor:"pointer"}}>{t.next}</button>
    </div>
  </Sec></Card>}
  {sstp===2&&<Card delay={100} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
    <Sec icon="🔒" title={t.setPin}><p style={{color:"var(--text3)",fontSize:13,textAlign:"center",marginBottom:20}}>{t.pinDesc}</p>
      <PinPad label={t.choosePin} onSubmit={pin=>{const mems=sMem.filter(m=>m.name.trim()).map((m,i)=>({id:"m"+Date.now()+"-"+i,name:m.name.trim(),avatar:m.avatar,color:m.color,photo:null}));fbS({members:mems,expenses:[],subscriptions:[],monthlyIncome:sInc,adminPin:pin,setupDone:true});sT(t.allSet)}}/>
    </Sec>
    <button onClick={()=>setSstp(1)} className="bp" style={{marginTop:18,padding:"10px 28px",borderRadius:12,border:"1px solid var(--border2)",background:"var(--glass2)",color:"var(--text)",fontWeight:700,cursor:"pointer"}}>{t.back}</button>

    </div>}

    {aTab==="tips"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>

    </div>}

</>)}
return null;
